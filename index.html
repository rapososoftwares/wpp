<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Telefone - WhatsApp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: #075E54;
            color: white;
            padding: 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 22px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .camera-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: #000;
            overflow: hidden;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #canvas {
            display: none;
        }

        .overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 40%;
            border: 4px solid #25D366;
            border-radius: 10px;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.7);
        }

        .overlay::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border: 2px solid rgba(37, 211, 102, 0.5);
            border-radius: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .overlay-text {
            position: absolute;
            bottom: -45px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 13px;
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 10px 16px;
            border-radius: 20px;
            white-space: nowrap;
            font-weight: 600;
        }

        .controls {
            padding: 20px;
        }

        .btn {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 10px;
        }

        .btn-capture {
            background: #25D366;
            color: white;
        }

        .btn-capture:active {
            background: #1DA851;
            transform: scale(0.98);
        }

        .btn-capture:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .result {
            padding: 20px;
            background: #F0F2F5;
            display: none;
        }

        .result.show {
            display: block;
        }

        .phone-display {
            background: white;
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 16px;
            border: 2px solid #25D366;
        }

        .phone-label {
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .phone-number {
            font-size: 24px;
            font-weight: 700;
            color: #075E54;
            letter-spacing: 1px;
        }

        .period-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .btn-period {
            background: linear-gradient(135deg, #25D366 0%, #20BA5A 100%);
            color: white;
            padding: 20px 10px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .btn-period:active {
            transform: scale(0.95);
            background: linear-gradient(135deg, #1DA851 0%, #188F4A 100%);
        }

        .btn-period .icon {
            font-size: 28px;
        }

        .btn-period.morning {
            background: linear-gradient(135deg, #FFB84D 0%, #FF9500 100%);
        }

        .btn-period.morning:active {
            background: linear-gradient(135deg, #FF9500 0%, #E88500 100%);
        }

        .btn-period.afternoon {
            background: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
        }

        .btn-period.afternoon:active {
            background: linear-gradient(135deg, #357ABD 0%, #2868AB 100%);
        }

        .status {
            text-align: center;
            padding: 12px;
            font-size: 14px;
            color: #666;
        }

        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #25D366;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #FFEBEE;
            color: #C62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: none;
            font-size: 14px;
        }

        .error.show {
            display: block;
        }

        .manual-input {
            display: none;
            margin-top: 15px;
        }

        .manual-input.show {
            display: block;
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #666;
            margin-bottom: 5px;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
        }

        .input-group input:focus {
            outline: none;
            border-color: #25D366;
        }

        .divider {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin: 15px 0;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #ddd;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Scanner Electrolux</h1>
            <p>Escaneie o número da nota fiscal</p>
        </div>

        <div class="camera-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas"></canvas>
            <div class="overlay">
                <div class="overlay-text">📱 Posicione apenas o NÚMERO aqui</div>
            </div>
        </div>

        <div class="controls">
            <div class="error" id="error"></div>
            <button class="btn btn-capture" id="captureBtn">
                📸 Capturar e Escanear
            </button>
            <div class="status" id="status">Câmera pronta</div>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p id="loadingText">Carregando...</p>
        </div>

        <div class="result" id="result">
            <div class="phone-display">
                <div class="phone-label">Número detectado:</div>
                <div class="phone-number" id="phoneNumber"></div>
            </div>
            
            <div class="period-buttons">
                <button class="btn-period morning" id="morningBtn">
                    <span class="icon">🌅</span>
                    <span>MANHÃ</span>
                </button>
                <button class="btn-period afternoon" id="afternoonBtn">
                    <span class="icon">🌆</span>
                    <span>TARDE</span>
                </button>
            </div>
            
            <div class="divider">OU</div>
            
            <button class="btn" style="background: #666; color: white;" id="newScanBtn">
                🔄 Escanear Outro Número
            </button>

            <div class="manual-input" id="manualInput">
                <div class="input-group">
                    <label>Não detectou? Digite manualmente:</label>
                    <input type="tel" id="manualPhone" placeholder="(11) 98765-4321" />
                </div>
                <div class="period-buttons">
                    <button class="btn-period morning" id="manualMorningBtn">
                        <span class="icon">🌅</span>
                        <span>MANHÃ</span>
                    </button>
                    <button class="btn-period afternoon" id="manualAfternoonBtn">
                        <span class="icon">🌆</span>
                        <span>TARDE</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const captureBtn = document.getElementById('captureBtn');
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loadingText');
        const result = document.getElementById('result');
        const phoneNumber = document.getElementById('phoneNumber');
        const morningBtn = document.getElementById('morningBtn');
        const afternoonBtn = document.getElementById('afternoonBtn');
        const newScanBtn = document.getElementById('newScanBtn');
        const errorDiv = document.getElementById('error');
        const manualInput = document.getElementById('manualInput');
        const manualPhone = document.getElementById('manualPhone');
        const manualMorningBtn = document.getElementById('manualMorningBtn');
        const manualAfternoonBtn = document.getElementById('manualAfternoonBtn');

        let detectedPhone = '';
        let worker = null;

        const messages = {
            morning: `Olá, tudo bem? 😊 
Aqui é da equipe de entregas da Electrolux.

Informamos que já estamos em rota e sua entrega será realizada hoje no período da manhã.

Pedimos, por gentileza, que tenha alguém no local para receber o produto. 
Obrigado! 🚚`,
            afternoon: `Olá, tudo bem? 😊 
Aqui é da equipe de entregas da Electrolux.

Informamos que já estamos em rota e sua entrega será realizada hoje no período da tarde.

Pedimos, por gentileza, que tenha alguém no local para receber o produto. 
Obrigado! 🚚`
        };

        // Inicializar Tesseract
        async function initTesseract() {
            try {
                loadingText.textContent = 'Inicializando scanner...';
                loading.classList.add('show');
                
                worker = await Tesseract.createWorker('eng', 1, {
                    logger: m => {
                        if (m.status === 'loading tesseract core') {
                            loadingText.textContent = 'Carregando motor OCR...';
                        } else if (m.status === 'initializing tesseract') {
                            loadingText.textContent = 'Inicializando...';
                        } else if (m.status === 'loading language traineddata') {
                            loadingText.textContent = 'Carregando idioma...';
                        } else if (m.status === 'initializing api') {
                            loadingText.textContent = 'Preparando API...';
                        }
                    }
                });
                
                await worker.setParameters({
                    tessedit_char_whitelist: '0123456789()- ',
                });
                
                loading.classList.remove('show');
                status.textContent = 'Scanner pronto!';
            } catch (err) {
                console.error('Erro ao inicializar Tesseract:', err);
                showError('Erro ao carregar scanner. Recarregue a página.');
                loading.classList.remove('show');
            }
        }

        // Iniciar câmera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: 'environment',
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    }
                });
                video.srcObject = stream;
                captureBtn.disabled = false;
            } catch (err) {
                showError('Erro ao acessar câmera: ' + err.message);
                captureBtn.disabled = true;
            }
        }

        // Capturar imagem
        captureBtn.addEventListener('click', async () => {
            if (!worker) {
                showError('Scanner ainda não está pronto. Aguarde...');
                return;
            }

            // Capturar apenas a área do quadrado
            const videoRect = video.getBoundingClientRect();
            const overlayWidth = videoRect.width * 0.7;
            const overlayHeight = videoRect.height * 0.4;
            const overlayX = (video.videoWidth - (video.videoWidth * 0.7)) / 2;
            const overlayY = (video.videoHeight - (video.videoHeight * 0.4)) / 2;

            canvas.width = video.videoWidth * 0.7;
            canvas.height = video.videoHeight * 0.4;
            const ctx = canvas.getContext('2d');
            
            // Desenhar apenas a região do quadrado
            ctx.drawImage(
                video,
                overlayX, overlayY, // posição de origem
                video.videoWidth * 0.7, video.videoHeight * 0.4, // tamanho de origem
                0, 0, // posição de destino
                canvas.width, canvas.height // tamanho de destino
            );

            loading.classList.add('show');
            loadingText.textContent = 'Processando imagem...';
            captureBtn.disabled = true;
            errorDiv.classList.remove('show');

            try {
                const imageData = canvas.toDataURL('image/png');
                await recognizePhone(imageData);
            } catch (err) {
                console.error('Erro ao processar:', err);
                showError('Erro ao processar imagem. Tente novamente.');
                loading.classList.remove('show');
                captureBtn.disabled = false;
            }
        });

        // Reconhecer número de telefone
        async function recognizePhone(imageData) {
            try {
                loadingText.textContent = 'Escaneando texto...';
                
                const { data: { text } } = await worker.recognize(imageData);
                
                console.log('Texto detectado:', text);

                // Buscar padrões de telefone brasileiro
                const phones = extractPhones(text);

                loading.classList.remove('show');

                if (phones.length > 0) {
                    detectedPhone = phones[0];
                    phoneNumber.textContent = formatPhone(detectedPhone);
                    result.classList.add('show');
                } else {
                    showError('Nenhum telefone detectado. Tente novamente ou digite manualmente.');
                    manualInput.classList.add('show');
                    result.classList.add('show');
                    captureBtn.disabled = false;
                }
            } catch (err) {
                console.error('Erro no OCR:', err);
                showError('Erro ao escanear. Digite o número manualmente.');
                manualInput.classList.add('show');
                result.classList.add('show');
                loading.classList.remove('show');
                captureBtn.disabled = false;
            }
        }

        // Extrair números de telefone do texto
        function extractPhones(text) {
            const cleaned = text.replace(/[^\d\s\(\)\-]/g, '');
            
            const patterns = [
                /\(?(\d{2})\)?[\s\-]?(\d{4,5})[\s\-]?(\d{4})/g,
                /(\d{2})[\s\-]?(\d{4,5})[\s\-]?(\d{4})/g,
                /(\d{10,11})/g
            ];

            const phones = [];
            for (const pattern of patterns) {
                const matches = [...cleaned.matchAll(pattern)];
                for (const match of matches) {
                    let phone = match[0].replace(/\D/g, '');
                    
                    if (phone.length === 10 || phone.length === 11) {
                        if (!phone.startsWith('55')) {
                            phone = '55' + phone;
                        }
                        phones.push(phone);
                    }
                }
            }

            return [...new Set(phones)];
        }

        // Formatar telefone para exibição
        function formatPhone(phone) {
            phone = phone.replace(/^55/, '');
            
            if (phone.length === 11) {
                return `(${phone.slice(0,2)}) ${phone.slice(2,7)}-${phone.slice(7)}`;
            } else if (phone.length === 10) {
                return `(${phone.slice(0,2)}) ${phone.slice(2,6)}-${phone.slice(6)}`;
            }
            return phone;
        }

        // Abrir WhatsApp com mensagem
        function openWhatsApp(phone, period) {
            const message = encodeURIComponent(messages[period]);
            const whatsappUrl = `https://wa.me/${phone}?text=${message}`;
            window.open(whatsappUrl, '_blank');
        }

        // Botões de período - número detectado
        morningBtn.addEventListener('click', () => {
            openWhatsApp(detectedPhone, 'morning');
        });

        afternoonBtn.addEventListener('click', () => {
            openWhatsApp(detectedPhone, 'afternoon');
        });

        // Botões de período - número manual
        manualMorningBtn.addEventListener('click', () => {
            const phone = manualPhone.value.replace(/\D/g, '');
            if (phone.length >= 10) {
                const fullPhone = phone.startsWith('55') ? phone : '55' + phone;
                openWhatsApp(fullPhone, 'morning');
            } else {
                showError('Digite um número válido com DDD');
            }
        });

        manualAfternoonBtn.addEventListener('click', () => {
            const phone = manualPhone.value.replace(/\D/g, '');
            if (phone.length >= 10) {
                const fullPhone = phone.startsWith('55') ? phone : '55' + phone;
                openWhatsApp(fullPhone, 'afternoon');
            } else {
                showError('Digite um número válido com DDD');
            }
        });

        // Novo scan
        newScanBtn.addEventListener('click', () => {
            result.classList.remove('show');
            manualInput.classList.remove('show');
            captureBtn.disabled = false;
            detectedPhone = '';
            manualPhone.value = '';
            status.textContent = 'Câmera pronta';
        });

        // Mostrar erro
        function showError(message) {
            errorDiv.textContent = message;
            errorDiv.classList.add('show');
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }

        // Iniciar
        startCamera();
        initTesseract();
    </script>
</body>
</html>
